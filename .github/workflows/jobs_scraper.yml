name: Iraq Jobs Scraper

on:
  schedule:
    # يعمل كل 4 ساعات تلقائياً
    - cron: '0 */4 * * *'
  workflow_dispatch: # زر للتشغيل اليدوي وقتما تشاء

jobs:
  scrape-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # صلاحية الكتابة للمستودع ودفع التغييرات
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SEARCH_ENGINE_ID: ${{ secrets.SEARCH_ENGINE_ID }}
        run: |
          python fetch_jobs.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pending_jobs.json logos/
          git commit -m "🤖 Scraper: تحديث الوظائف المعلقة وشعارات الشركات" || exit 0
          git push origin main
