name: Process Notification Queue

on:
  push:
    paths:
      - 'notifications_queue.json'
  workflow_dispatch:

concurrency:
  group: process_notifications
  cancel-in-progress: true

jobs:
  process-notifications:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install firebase-admin

      - name: Create Service Account File
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json

      - name: Run Notifications Script
        run: python send_queued_notifications.py
        
      - name: Commit Emptied Queue
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add notifications_queue.json
          git commit -m "🤖 System: تم تفريغ طابور الإشعارات بعد إرسالها بنجاح" || exit 0
          git push origin main
