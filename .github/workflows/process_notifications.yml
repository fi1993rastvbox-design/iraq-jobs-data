name: Process Notification Queue

on:
  push:
    paths:
      - 'notifications_queue.json'
  workflow_dispatch:

jobs:
  process-notifications:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install firebase-admin

      - name: Run Notifications Script
        run: |
          python send_queued_notifications.py

      - name: Commit Emptied Queue
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add notifications_queue.json
          git commit -m "🤖 System: تم تفريغ طابور الإشعارات بعد إرسالها بنجاح" || exit 0
          git push origin main
